<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0D1B2A"/>
  <!-- Compass circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Cardinal points (N/S/E/W) -->
  <polygon points="16,3.5 17.8,13 16,11 14.2,13" fill="#2E7D32"/>
  <polygon points="16,28.5 14.2,19 16,21 17.8,19" fill="#66BB6A"/>
  <polygon points="28.5,16 19,14.2 21,16 19,17.8" fill="#66BB6A"/>
  <polygon points="3.5,16 13,17.8 11,16 13,14.2" fill="#66BB6A"/>
  <!-- Intercardinal lines -->
  <line x1="8.2" y1="8.2" x2="23.8" y2="23.8" stroke="#2E7D32" stroke-width="0.7"/>
  <line x1="23.8" y1="8.2" x2="8.2" y2="23.8" stroke="#2E7D32" stroke-width="0.7"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#2E7D32"/>
</svg>
